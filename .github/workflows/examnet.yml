name: 'Examnet'

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ytl-linux-digabi2-examnet
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: digabi/workflows-common/actions/setup-node@main
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
      - name: Install Node.js dependencies
        run: npm ci --workspaces --iwr --no-audit --no-fund
      - name: Run unit tests
        run: npm run test